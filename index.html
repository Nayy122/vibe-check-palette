<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Check | Color Palette Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <button id="settings-btn" class="icon-btn" aria-label="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content glass">
            <h2>Configuration</h2>
            <p>Enter your Google Gemini API Key to generate palettes.</p>
            <input type="password" id="api-key-input" placeholder="AIzaSy...">
            <div class="modal-actions">
                <button id="save-key-btn" class="primary-btn">Save Key</button>
                <button id="close-modal-btn" class="secondary-btn">Close</button>
            </div>
            <p class="hint">The key is stored locally in your browser.</p>
        </div>
    </div>

    <main class="container">
        <header>
            <h1 class="gradient-text">Vibe Check</h1>
            <p class="subtitle">Generate a cohesive color palette from any mood, scene, or scenario.</p>
        </header>

        <section class="generator-section glass">
            <form id="vibe-form">
                <div class="input-wrapper">
                    <input type="text" id="vibe-input" placeholder="e.g. A rainy cyberpunk night in Tokyo" autocomplete="off" required>
                    <button type="submit" id="generate-btn" class="primary-btn">
                        <span class="btn-text">Generate</span>
                        <div class="spinner hidden"></div>
                    </button>
                </div>
            </form>
        </section>

        <section id="palette-display" class="palette-grid hidden">
            <!-- Color blocks will be injected here -->
        </section>
    </main>

    <div id="toast" class="toast hidden">Copied to clipboard!</div>

    <script src="app.js"></script>
</body>
</html>
